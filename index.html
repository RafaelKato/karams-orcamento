<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Orçamentário 2026 — Karams Estofados</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Mono:wght@400;500;600&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#f3f2ef;--card:#fff;--border:#e2dfda;--ink:#18171a;--ink2:#55524e;--ink3:#9a978f;
  --accent:#1c3a5e;--a2:#2b5f96;--green:#166140;--gbg:#e6f4ee;
  --red:#9b1a1a;--rbg:#fce8e8;--amber:#7a4800;--abg:#fef3db;--bbg:#e8f0fa;
  --sh:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.05)
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--ink);font-size:13px;line-height:1.5;min-height:100vh}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:20px}
#loading .logo-load{font-family:'DM Serif Display',serif;font-size:36px;color:#fff}
#loading .sub-load{font-size:12px;color:rgba(255,255,255,.6);letter-spacing:2px;text-transform:uppercase}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#error-msg{display:none;position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--rbg);border:1px solid var(--red);color:var(--red);padding:12px 20px;border-radius:8px;font-size:13px;z-index:500;max-width:500px;text-align:center}

/* HEADER */
.hdr{background:var(--accent);color:#fff;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.hdr-l{display:flex;align-items:center;gap:14px}
.logo{font-family:'DM Serif Display',serif;font-size:21px;line-height:1}
.logo small{display:block;font-family:'Sora',sans-serif;font-weight:300;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-top:1px}
.hdiv{width:1px;height:28px;background:rgba(255,255,255,.18)}
.hsub{font-size:12.5px;color:rgba(255,255,255,.72)}
.hpill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:5px;padding:4px 12px;font-size:10.5px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.88)}
.hdr-right{display:flex;align-items:center;gap:10px}
.update-info{font-size:10px;color:rgba(255,255,255,.5);letter-spacing:.5px}

/* LAYOUT */
.wrap{max-width:1500px;margin:0 auto;padding:22px 28px 56px}
.ctrl{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.clbl{font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:1.2px;margin-right:2px}
.mp{padding:5px 15px;border-radius:99px;border:1.5px solid var(--border);background:var(--card);font-size:12px;font-weight:500;cursor:pointer;transition:all .14s;color:var(--ink2)}
.mp:hover{border-color:var(--a2);color:var(--accent)}.mp.on{background:var(--accent);border-color:var(--accent);color:#fff}
.mp.ac{border-style:dashed}.mp.ac.on{border-style:solid}

/* KPI */
.krow{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--card);border-radius:10px;padding:18px 18px 14px;box-shadow:var(--sh);border:1px solid var(--border);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:10px 0 0 10px;background:var(--a2)}
.kpi.g::before{background:var(--green)}.kpi.r::before{background:var(--red)}
.klab{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--ink3);margin-bottom:7px}
.kval{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;color:var(--ink);line-height:1;margin-bottom:5px}
.kval.sm{font-size:15px}
.kfoot{font-size:10.5px;color:var(--ink3);display:flex;align-items:center;gap:6px}
.bv{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px}
.bv.pos{background:var(--gbg);color:var(--green)}.bv.neg{background:var(--rbg);color:var(--red)}

/* TABS */
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:20px}
.tbtn{padding:9px 22px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--ink3);border-bottom:2.5px solid transparent;margin-bottom:-2px;transition:all .14s}
.tbtn:hover{color:var(--ink)}.tbtn.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.tc{display:none}.tc.on{display:block}
.sh{display:flex;align-items:baseline;gap:10px;margin-bottom:14px}
.sh-t{font-family:'DM Serif Display',serif;font-size:17px}.sh-s{font-size:11px;color:var(--ink3)}

/* CHARTS */
.cr{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:20px}
.cc{background:var(--card);border-radius:10px;padding:18px 22px;box-shadow:var(--sh);border:1px solid var(--border)}
.cc.wide{grid-column:1/-1}
.ct{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink2);margin-bottom:14px}
.cw{position:relative;height:210px}.cw.tall{height:250px}

/* DRE */
.dw{background:var(--card);border-radius:10px;box-shadow:var(--sh);border:1px solid var(--border);overflow:hidden;margin-bottom:20px}
.dre{width:100%;border-collapse:collapse}
.dre th{background:var(--accent);color:rgba(255,255,255,.88);font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;padding:9px 14px;text-align:right}
.dre th:first-child{text-align:left;width:30%}
.dre td{padding:8px 14px;font-size:12px;border-bottom:1px solid var(--border);text-align:right;font-family:'IBM Plex Mono',monospace}
.dre td:first-child{text-align:left;font-family:'Sora',sans-serif}
.dre tr:hover td{background:#f8f7f4}
.dre tr.sub td{background:var(--bbg);font-weight:600;font-size:12.5px;border-top:1.5px solid #c0d4ef;border-bottom:1.5px solid #c0d4ef}
.dre tr.sub:hover td{background:#d8eaf8}
.dre tr.ebt td{background:#0f2a1a;color:#6ee09a;font-weight:700;font-size:13px;border:none}
.dre tr.ebt:hover td{background:#143522}
.dre tr.llt td{background:var(--accent);color:#fff;font-weight:700;font-size:13px;border:none}
.dre tr.llt:hover td{background:#1e4470}
.nd{color:var(--ink3);font-style:italic;font-size:10.5px}
.vc{display:flex;align-items:center;justify-content:flex-end;gap:5px}
.vb{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap}
.vb.pos{background:var(--gbg);color:var(--green)}.vb.neg{background:var(--rbg);color:var(--red)}

/* DETAIL SECTIONS */
.dsec{background:var(--card);border-radius:10px;box-shadow:var(--sh);border:1px solid var(--border);overflow:hidden;margin-bottom:14px}
.dsh{background:var(--accent);color:#fff;padding:11px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.dsh h3{font-family:'DM Serif Display',serif;font-size:14.5px;font-weight:400}
.dsh .meta{display:flex;align-items:center;gap:14px;font-size:11px;color:rgba(255,255,255,.7)}
.dsh .meta strong{font-family:'IBM Plex Mono',monospace;color:rgba(255,255,255,.95)}
.ti{font-size:13px;transition:transform .18s}
.dsec.coll .ti{transform:rotate(-90deg)}.dsec.coll .dtw{display:none}
.dt{width:100%;border-collapse:collapse}
.dt th{background:#f0ede8;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--ink2);padding:7px 14px;text-align:right;border-bottom:1px solid var(--border)}
.dt th:first-child{text-align:left;width:36%}.dt th:nth-child(2){text-align:center;width:80px}
.dt td{padding:7px 14px;font-size:11.5px;border-bottom:1px solid #edeae5;text-align:right;font-family:'IBM Plex Mono',monospace}
.dt td:first-child{text-align:left;font-family:'Sora',sans-serif}.dt td:nth-child(2){text-align:center;font-family:'Sora',sans-serif}
.dt tr:last-child td{border-bottom:none}.dt tr:hover td{background:#faf9f7}
.chip{display:inline-flex;align-items:center;font-family:'Sora',sans-serif;font-size:9.5px;font-weight:600;padding:1px 7px;border-radius:99px}
.pb-w{display:flex;align-items:center;gap:6px}
.pb{flex:1;height:4px;background:#e8e5e0;border-radius:99px;overflow:hidden;min-width:36px}
.pbf{height:100%;border-radius:99px}
.pct{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--ink3);min-width:34px;text-align:right}

/* RESPONSÁVEL */
.rg{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.rc{background:var(--card);border-radius:10px;box-shadow:var(--sh);border:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column}
.rch{padding:14px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.rav{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:20px;color:#fff;flex-shrink:0}
.rn{font-weight:600;font-size:14px}.rr{font-size:10.5px;color:var(--ink3)}
.rcs{display:grid;grid-template-columns:1fr 1fr 1fr;padding:10px 18px;gap:6px;border-bottom:1px solid var(--border);background:#fafaf8}
.rsl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3)}
.rsv{font-family:'IBM Plex Mono',monospace;font-size:12.5px;font-weight:600;color:var(--ink);margin-top:2px}
.rtw{overflow-y:auto;flex:1;max-height:480px}
.rt{width:100%;border-collapse:collapse}
.rt th{background:#f0ede8;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink2);padding:6px 12px;text-align:right;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:2}
.rt th:first-child{text-align:left}
.rt td{padding:6px 12px;border-bottom:1px solid #edeae5;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:11px}
.rt td:first-child{text-align:left;font-family:'Sora',sans-serif;font-size:11px}
.rt tr:hover td{background:#faf9f7}
.rt tr.catrow td{background:#edeae5;font-family:'Sora',sans-serif;font-size:10px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px;border-top:1.5px solid var(--border);border-bottom:1px solid var(--border)}
.rt tr.tot td{font-weight:700;background:#e8e5e0;border-top:1.5px solid var(--border);border-bottom:none;font-size:11.5px;position:sticky;bottom:0}

@media(max-width:1100px){.krow{grid-template-columns:repeat(3,1fr)}.rg{grid-template-columns:repeat(2,1fr)}.cr{grid-template-columns:1fr}}
@media(max-width:700px){.wrap{padding:12px}.krow{grid-template-columns:repeat(2,1fr)}.rg{grid-column:1fr}.hdr{padding:0 14px}}
</style>
</head>
<body>

<!-- LOADING OVERLAY -->
<div id="loading">
  <div class="logo-load">Karams</div>
  <div class="spinner"></div>
  <div class="sub-load">Carregando orçamento...</div>
</div>
<div id="error-msg"></div>

<header class="hdr">
  <div class="hdr-l">
    <div class="logo">Karams<small>Estofados</small></div>
    <div class="hdiv"></div>
    <div class="hsub">Dashboard Orçamentário</div>
  </div>
  <div class="hdr-right">
    <div class="update-info" id="updateInfo"></div>
    <div class="hpill">Exercício 2026</div>
  </div>
</header>

<main class="wrap">
  <div class="ctrl">
    <span class="clbl">Período</span>
    <button class="mp ac on" onclick="setM('all',this)">Acumulado</button>
    <button class="mp" onclick="setM(0,this)">Jan/26</button>
    <button class="mp" onclick="setM(1,this)">Fev/26</button>
    <button class="mp" onclick="setM(2,this)">Mar/26</button>
  </div>
  <div class="krow" id="krow"></div>
  <div class="tabs">
    <button class="tbtn on" onclick="sTab('macro',this)">Visão Macro</button>
    <button class="tbtn" onclick="sTab('contas',this)">Por Conta</button>
    <button class="tbtn" onclick="sTab('resp',this)">Por Responsável</button>
  </div>
  <div class="tc on" id="tab-macro">
    <div class="cr">
      <div class="cc"><div class="ct">Faturamento — Orçado vs Realizado</div><div class="cw"><canvas id="cFat"></canvas></div></div>
      <div class="cc"><div class="ct">EBITDA & Lucro Líquido — Orçado</div><div class="cw"><canvas id="cRes"></canvas></div></div>
      <div class="cc wide"><div class="ct">Composição de Custos e Despesas — Orçado Jan–Mar 2026</div><div class="cw tall"><canvas id="cStk"></canvas></div></div>
    </div>
    <div class="sh"><div class="sh-t">DRE Gerencial</div><div class="sh-s" id="dreSub"></div></div>
    <div class="dw"><table class="dre" id="dreT"></table></div>
  </div>
  <div class="tc" id="tab-contas">
    <div class="sh"><div class="sh-t">Detalhamento por Conta</div><div class="sh-s" id="cSub"></div></div>
    <div id="cBox"></div>
  </div>
  <div class="tc" id="tab-resp">
    <div class="sh"><div class="sh-t">Performance por Responsável</div><div class="sh-s" id="rSub"></div></div>
    <div class="rg" id="rGrid"></div>
  </div>
</main>

<script>
// ══════════════════════════════════════════════
//  ↓↓↓  ÚNICA LINHA QUE VOCÊ PRECISA ALTERAR  ↓↓↓
//  Substitua pelo raw URL do seu repositório GitHub
// ══════════════════════════════════════════════
const EXCEL_URL = 'https://raw.githubusercontent.com/rafaelkato/karams-orcamento/main/WP%20Karams%202026%20v2.xlsx';
// ══════════════════════════════════════════════

const MO  = ['Jan/26','Fev/26','Mar/26'];
const MOF = ['Janeiro 2026','Fevereiro 2026','Março 2026'];

// Colunas (índice 0-based) na aba "Acompanhamento Orçamento"
const C = { RESP:7, NOME:8, JAN_ORC:13, JAN_REAL:15, FEV_ORC:17, FEV_REAL:19, MAR_ORC:21, MAR_REAL:23 };

// Linhas-macro que identificamos pelo nome exato na planilha
const MACRO_DEF = [
  {key:'Faturamento',                      id:'fat', t:'rec',  label:'Faturamento'},
  {key:'Deduções',                         id:'ded', t:'cst',  label:'(-) Tributos / Deduções',    cat:'Tributos / Deduções'},
  {key:'Receita Líquida',                  id:'rl',  t:'sub',  label:'Receita Líquida'},
  {key:'CPV',                              id:'cpv', t:'cst',  label:'(-) CPV',                    cat:'CPV'},
  {key:'Custos Diretos',                   id:'cd',  t:'cst',  label:'(-) Custo Direto (MOD)',      cat:'Custo Direto (MOD)'},
  {key:'Custos Indiretos de Fabricação',   id:'ci',  t:'cst',  label:'(-) Custo Indireto (CIF)',    cat:'Custo Indireto (CIF)'},
  {key:'Lucro Bruto',                      id:'lb',  t:'sub',  label:'Lucro Bruto'},
  {key:'Despesa com Pessoal',              id:'dp',  t:'cst',  label:'(-) Despesas c/ Pessoal',    cat:'Despesas com Pessoal'},
  {key:'Despesas Administrativas',         id:'da',  t:'cst',  label:'(-) Despesas Administrativas',cat:'Despesas Administrativas'},
  {key:'Despesas Comerciais',              id:'dc',  t:'cst',  label:'(-) Despesas Comerciais',    cat:'Despesas Comerciais'},
  {key:'Serviços de Terceiros',            id:'st',  t:'cst',  label:'(-) Serviços de Terceiros',  cat:'Serviços de Terceiros'},
  {key:'Resultado Operacional (EBITDA)',   id:'eb',  t:'ebt',  label:'EBITDA'},
  {key:'Despesas Financeiras',             id:'df',  t:'cst',  label:'(-) Despesas Financeiras',   cat:'Despesas Financeiras'},
  {key:'Lucro Líquido',                    id:'ll',  t:'llt',  label:'Lucro Líquido'},
];
const MACRO_KEY_MAP = {};
MACRO_DEF.forEach(m => MACRO_KEY_MAP[m.key] = m);

const RESP_INFO = {
  'Rafael':  {c:'#1c3a5e', r:'Diretor de Produção'},
  'Letícia': {c:'#5b2d8e', r:'Financeiro & Comercial'},
  'Mylena':  {c:'#166140', r:'Diretora Administrativa'},
  'Thaís':   {c:'#b84d00', r:'Marketing & Eventos'},
  'Fábio':   {c:'#8a1a1a', r:'Diretor Geral'},
};

// Estado global
let macro  = [];
let contas = [];
let cm     = 'all';
const chts = {};

// ─── LEITURA DO EXCEL ────────────────────────
async function loadData() {
  try {
    const res = await fetch(EXCEL_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const ab = await res.arrayBuffer();
    const wb = XLSX.read(ab, {type:'array', cellDates:false});

    const sheetName = wb.SheetNames.find(n => n.includes('Acompanhamento') && !n.includes('(2)')); if (!sheetName) { throw new Error('Aba nao encontrada. Abas: ' + wb.SheetNames.join(', ')); }

    const ws = wb.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:true, defval:null});

    parseRows(rows);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('updateInfo').textContent = 'Atualizado: ' + new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    buildAll();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('error-msg');
    el.textContent = '⚠ Erro ao carregar o arquivo: ' + e.message + '. Verifique se o Excel está no repositório.';
    el.style.display = 'block';
  }
}

function parseRows(rows) {
  const macroMap = {};
  let currentCat = null;
  const tempContas = [];
  const seen = new Set();

  // Linhas de dados começam no índice 9 (linha 10 no Excel)
  for (let i = 9; i < rows.length; i++) {
    const row = rows[i];
    if (!row) continue;

    const nome = row[C.NOME];
    const resp = row[C.RESP];
    if (!nome || typeof nome !== 'string' || !nome.trim()) continue;

    const nomeTrim = nome.trim();
    const num = v => (typeof v === 'number' && isFinite(v)) ? v : null;

    const orc  = [num(row[C.JAN_ORC]),  num(row[C.FEV_ORC]),  num(row[C.MAR_ORC])];
    const real = [num(row[C.JAN_REAL]), num(row[C.FEV_REAL]), num(row[C.MAR_REAL])];

    if (MACRO_KEY_MAP[nomeTrim]) {
      const def = MACRO_KEY_MAP[nomeTrim];
      macroMap[def.id] = {id:def.id, n:def.label, t:def.t, orc, real};
      if (def.cat) currentCat = def.cat;
    } else if (resp && typeof resp === 'string' && resp !== 'Responsável' && currentCat) {
      const key = nomeTrim + '|' + i; // usar índice pra evitar colapsar duplicatas
      tempContas.push({cat:currentCat, resp:resp.trim(), n:nomeTrim, orc, real});
    }
  }

  macro  = MACRO_DEF.map(d => macroMap[d.id]).filter(Boolean);
  contas = tempContas;
}

// ─── FORMATADORES ────────────────────────────
function fK(v) {
  if (v===null||v===undefined) return null;
  const a=Math.abs(v);
  let s = a>=1e6 ? 'R$'+(a/1e6).toFixed(2).replace('.',',')+'M'
        : a>=1000 ? 'R$'+(a/1000).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,'.')+'K'
        : 'R$'+a.toFixed(0);
  return v<0?'('+s+')':s;
}
function fF(v) {
  if (v===null||v===undefined) return '–';
  const a=Math.abs(v);
  const s='R$ '+a.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,'.');
  return v<0?'('+s+')':s;
}
function fP(v) {
  if (v===null||!isFinite(v)) return null;
  return (v>=0?'+':'')+(v*100).toFixed(1)+'%';
}
function gv(arr,m) {
  if (!arr) return null;
  if (m==='all') { const n=arr.filter(x=>x!==null); return n.length ? n.reduce((a,b)=>a+b,0) : null; }
  return arr[m]!==undefined ? arr[m] : null;
}
// var para custo: (real-|orc|)/|orc|  → negativo = favorável
// var para receita: (real-orc)/orc    → positivo = favorável
function calcVar(orc,real,t) {
  if (orc===null||real===null) return null;
  const b=Math.abs(orc); if (b===0) return null;
  return t==='rec' ? (real-orc)/orc : (real-b)/b;
}
function isFav(vp,t) { return vp===null ? null : (t==='rec' ? vp>=0 : vp<=0); }
function vbadge(vp,t) {
  if (vp===null) return '<span class="nd">–</span>';
  return `<span class="vb ${isFav(vp,t)?'pos':'neg'}">${fP(vp)}</span>`;
}

// ─── KPI ─────────────────────────────────────
function buildKPI() {
  const fat=macro.find(r=>r.id==='fat')||{orc:[null,null,null],real:[null,null,null]};
  const lb =macro.find(r=>r.id==='lb') ||{orc:[null,null,null]};
  const eb =macro.find(r=>r.id==='eb') ||{orc:[null,null,null]};
  const ll =macro.find(r=>r.id==='ll') ||{orc:[null,null,null]};
  const fO=gv(fat.orc,cm), fR=gv(fat.real,cm), lO=gv(lb.orc,cm), eO=gv(eb.orc,cm), lLO=gv(ll.orc,cm);
  const fV=fO?calcVar(fO,fR,'rec'):null;
  function badge(v,g=true){if(v===null||!isFinite(v))return'';const c=(v>=0)===g?'pos':'neg';return`<span class="bv ${c}">${(v>=0?'+':'')+(v*100).toFixed(1)}%</span>`;}
  function card(lbl,val,foot,badg,cls=''){return`<div class="kpi ${cls}"><div class="klab">${lbl}</div><div class="kval${val.length>14?' sm':''}">${val}</div><div class="kfoot">${foot}${badg?' '+badg:''}</div></div>`;}
  document.getElementById('krow').innerHTML=[
    card('Faturamento'+(cm==='all'?' Acum.':' '+MO[cm]), fK(fR)||'–', 'vs orçado '+fF(fO), badge(fV,true), fR!==null&&fR>=fO?'g':'r'),
    card('Margem Bruta (Orç.)', lO&&fO?((lO/fO*100).toFixed(1)+'%'):'–', 'Lucro Bruto: '+fF(lO), ''),
    card('EBITDA'+(cm==='all'?' Acum.':' '+MO[cm]), fK(eO)||'–', eO>=0?'✓ Positivo':'✗ Negativo', '', eO!==null&&eO>=0?'g':'r'),
    card('Lucro Líquido', fK(lLO)||'–', lLO>=0?'Positivo no período':'Negativo no período', '', lLO!==null&&lLO>=0?'g':'r'),
    card('Desvio Faturamento', fR!==null&&fO!==null?fK(fR-fO):'–', cm==='all'?'acum. Jan–Mar':MO[cm], badge(fV,true), fR!==null&&fR>=fO?'g':'r'),
  ].join('');
}

// ─── DRE ─────────────────────────────────────
function buildDRE() {
  document.getElementById('dreSub').textContent = cm==='all'?'Acumulado Jan–Mar 2026':MOF[cm];
  const cols = cm==='all'
    ? ['Orçado Acum. (Jan–Mar)','Realizado Acum.','Var. (R$)','Var. (%)']
    : ['Orçado '+MO[cm],'Realizado '+MO[cm],'Var. (R$)','Var. (%)'];
  let h=`<thead><tr><th>Conta</th><th>${cols[0]}</th><th>${cols[1]}</th><th>${cols[2]}</th><th>${cols[3]}</th></tr></thead><tbody>`;
  macro.forEach(row=>{
    const o=gv(row.orc,cm), r=gv(row.real,cm);
    const vp=calcVar(o,r,row.t), va=(o!==null&&r!==null)?r-Math.abs(o):null;
    const f=isFav(vp,row.t);
    const tc=row.t==='sub'?'sub':row.t==='ebt'?'ebt':row.t==='llt'?'llt':'';
    const vaH=va!==null?`<span style="color:${f?'var(--green)':'var(--red)'};font-weight:600">${fF(va)}</span>`:'<span class="nd">–</span>';
    h+=`<tr class="${tc}"><td>${row.n}</td><td>${o!==null?fF(o):'–'}</td><td>${r!==null?fF(r):'<span class="nd">S/D</span>'}</td><td class="vc">${vaH}</td><td class="vc">${vbadge(vp,row.t)}</td></tr>`;
  });
  document.getElementById('dreT').innerHTML = h+'</tbody>';
}

// ─── CONTAS ──────────────────────────────────
function buildContas() {
  document.getElementById('cSub').textContent = cm==='all'?'Acumulado Jan–Mar 2026 — Orçado vs Realizado':MOF[cm]+' — Orçado vs Realizado';
  const cats = [...new Set(contas.map(c=>c.cat))];
  document.getElementById('cBox').innerHTML = cats.map(cat=>{
    const items = contas.filter(c=>c.cat===cat);
    const tO = items.reduce((s,c)=>s+(gv(c.orc,cm)||0),0);
    const wR = items.filter(c=>gv(c.real,cm)!==null);
    const tR = wR.reduce((s,c)=>s+(gv(c.real,cm)||0),0);
    const rows = items.map(item=>{
      const o=gv(item.orc,cm), r=gv(item.real,cm);
      const vp=calcVar(o,r,'cst'), va=(o!==null&&r!==null)?r-Math.abs(o):null;
      const f=vp!==null&&vp<=0;
      const rc=(RESP_INFO[item.resp]||{c:'#555'}).c;
      const pct=o&&r?Math.min(r/Math.abs(o)*100,200):null;
      return`<tr>
        <td>${item.n}</td>
        <td><span class="chip" style="background:${rc}18;color:${rc}">${item.resp}</span></td>
        <td>${fF(o)}</td>
        <td>${r!==null?fF(r):'<span class="nd">S/D</span>'}</td>
        <td>${va!==null?`<span style="color:${f?'var(--green)':'var(--red)'};font-weight:600">${fF(va)}</span>`:'<span class="nd">–</span>'}</td>
        <td>${vp!==null?`<span class="vb ${f?'pos':'neg'}">${fP(vp)}</span>`:'<span class="nd">–</span>'}</td>
        <td><div class="pb-w"><div class="pb"><div class="pbf" style="width:${Math.min(pct||0,100)}%;background:${pct&&pct>120?'var(--red)':pct&&pct>90?'#d97706':'var(--a2)'}"></div></div><span class="pct">${pct?pct.toFixed(0)+'%':'–'}</span></div></td>
      </tr>`;
    }).join('');
    const sid='s_'+cat.replace(/[^a-z0-9]/gi,'_');
    return`<div class="dsec" id="${sid}">
      <div class="dsh" onclick="tgl('${sid}')">
        <h3>${cat}</h3>
        <div class="meta">
          <span>Orçado: <strong>${fF(tO)}</strong></span>
          ${wR.length?`<span>Realizado: <strong>${fF(tR)}</strong></span>`:''}
          <span class="ti">▾</span>
        </div>
      </div>
      <div class="dtw"><table class="dt">
        <thead><tr><th>Conta</th><th>Resp.</th><th>Orçado</th><th>Realizado</th><th>Var. (R$)</th><th>Var. (%)</th><th style="width:110px">% Exec.</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
  }).join('');
}
function tgl(id){document.getElementById(id).classList.toggle('coll');}

// ─── RESPONSÁVEIS ────────────────────────────
function buildResp() {
  document.getElementById('rSub').textContent = cm==='all'?'Acumulado Jan–Mar 2026':MOF[cm];
  const resps = [...new Set(contas.map(c=>c.resp))].filter(r=>RESP_INFO[r]);
  document.getElementById('rGrid').innerHTML = resps.map(resp=>{
    const info = RESP_INFO[resp];
    const items = contas.filter(c=>c.resp===resp);
    const tO = items.reduce((s,c)=>s+(gv(c.orc,cm)||0),0);
    const wR = items.filter(c=>gv(c.real,cm)!==null);
    const tR = wR.reduce((s,c)=>s+(gv(c.real,cm)||0),0);
    const vp = tO?calcVar(tO,tR,'cst'):null;
    const f  = vp!==null&&vp<=0;
    const cats = [...new Set(items.map(c=>c.cat))];
    const rows = cats.map(cat=>{
      const ci  = items.filter(c=>c.cat===cat);
      const cO  = ci.reduce((s,c)=>s+(gv(c.orc,cm)||0),0);
      const cwR = ci.filter(c=>gv(c.real,cm)!==null);
      const cR  = cwR.reduce((s,c)=>s+(gv(c.real,cm)||0),0);
      const catRow=`<tr class="catrow"><td colspan="2">${cat}</td><td>${fF(cO)}</td><td>${cwR.length?fF(cR):'–'}</td><td></td></tr>`;
      const irows=ci.map(item=>{
        const o=gv(item.orc,cm), r=gv(item.real,cm);
        const vpi=calcVar(o,r,'cst'), fi=vpi!==null&&vpi<=0;
        const pct=o&&r?Math.min(r/Math.abs(o)*100,200):null;
        return`<tr>
          <td style="padding-left:14px">${item.n}</td><td></td>
          <td>${fF(o)}</td>
          <td>${r!==null?fF(r):'<span class="nd">–</span>'}</td>
          <td><div class="pb-w"><div class="pb"><div class="pbf" style="width:${Math.min(pct||0,100)}%;background:${pct&&pct>120?'var(--red)':pct&&pct>90?'#d97706':info.c}"></div></div><span class="pct">${pct?pct.toFixed(0)+'%':'–'}</span></div></td>
        </tr>`;
      }).join('');
      return catRow+irows;
    }).join('');
    return`<div class="rc">
      <div class="rch"><div class="rav" style="background:${info.c}">${resp[0]}</div>
        <div><div class="rn">${resp}</div><div class="rr">${info.r}</div></div></div>
      <div class="rcs">
        <div><div class="rsl">Orçado</div><div class="rsv">${fK(tO)||'–'}</div></div>
        <div><div class="rsl">Realizado</div><div class="rsv">${wR.length?fK(tR):'–'}</div></div>
        <div><div class="rsl">Variação</div><div class="rsv" style="color:${f?'var(--green)':'var(--red)'}">${vp!==null?(vp>=0?'+':'')+(vp*100).toFixed(1)+'%':'–'}</div></div>
      </div>
      <div class="rtw"><table class="rt">
        <thead><tr><th>Conta</th><th></th><th>Orçado</th><th>Realizado</th><th style="width:80px">% Exec.</th></tr></thead>
        <tbody>${rows}
          <tr class="tot"><td>${items.length} contas</td><td></td><td>${fF(tO)}</td><td>${wR.length?fF(tR):'–'}</td><td></td></tr>
        </tbody>
      </table></div>
    </div>`;
  }).join('');
}

// ─── GRÁFICOS ────────────────────────────────
function dch(id){if(chts[id]){chts[id].destroy();delete chts[id];}}
function initCharts() {
  const fat=macro.find(r=>r.id==='fat')||{orc:[0,0,0],real:[0,0,0]};
  const eb =macro.find(r=>r.id==='eb') ||{orc:[0,0,0]};
  const ll =macro.find(r=>r.id==='ll') ||{orc:[0,0,0]};
  dch('fat');
  chts['fat']=new Chart(document.getElementById('cFat'),{type:'bar',data:{labels:MO,datasets:[
    {label:'Orçado',data:fat.orc,backgroundColor:'rgba(28,58,94,.2)',borderColor:'#1c3a5e',borderWidth:2,borderRadius:4},
    {label:'Realizado',data:fat.real.map(v=>v||0),backgroundColor:'rgba(43,95,150,.75)',borderColor:'#2b5f96',borderWidth:0,borderRadius:4},
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{family:'Sora',size:11},boxWidth:12}}},
    scales:{x:{grid:{display:false},ticks:{font:{family:'IBM Plex Mono',size:11}}},y:{grid:{color:'#e8e5e0'},ticks:{font:{family:'IBM Plex Mono',size:10},callback:v=>'R$'+(v/1000).toFixed(0)+'K'}}}}});
  dch('res');
  chts['res']=new Chart(document.getElementById('cRes'),{type:'bar',data:{labels:MO,datasets:[
    {label:'EBITDA',data:eb.orc,backgroundColor:eb.orc.map(v=>v>=0?'rgba(22,97,64,.6)':'rgba(155,26,26,.5)'),borderWidth:0,borderRadius:4},
    {label:'Lucro Líquido',data:ll.orc,backgroundColor:ll.orc.map(v=>v>=0?'rgba(22,97,64,.9)':'rgba(155,26,26,.85)'),borderWidth:0,borderRadius:4},
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{family:'Sora',size:11},boxWidth:12}}},
    scales:{x:{grid:{display:false},ticks:{font:{family:'IBM Plex Mono',size:11}}},y:{grid:{color:'#e8e5e0'},ticks:{font:{family:'IBM Plex Mono',size:10},callback:v=>'R$'+(v/1000).toFixed(0)+'K'}}}}});
  dch('stk');
  const cm2=[{id:'cpv',n:'CPV',c:'#1c3a5e'},{id:'cd',n:'Custo Direto',c:'#2b5f96'},{id:'ci',n:'Custo Indireto',c:'#4a82b8'},{id:'dp',n:'Desp. Pessoal',c:'#166140'},{id:'da',n:'Desp. Admin',c:'#2a9464'},{id:'dc',n:'Desp. Comerciais',c:'#b84d00'},{id:'st',n:'Serv. Terceiros',c:'#e07428'}];
  chts['stk']=new Chart(document.getElementById('cStk'),{type:'bar',data:{labels:MO,datasets:cm2.map(x=>{const r=macro.find(m=>m.id===x.id)||{orc:[0,0,0]};return{label:x.n,data:r.orc.map(v=>Math.abs(v||0)),backgroundColor:x.c,borderWidth:0};})},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{family:'Sora',size:11},boxWidth:12,padding:8}},tooltip:{callbacks:{label:c=>c.dataset.label+': R$'+(c.raw/1000).toFixed(0)+'K'}}},
    scales:{x:{stacked:true,grid:{display:false},ticks:{font:{family:'IBM Plex Mono',size:11}}},y:{stacked:true,grid:{color:'#e8e5e0'},ticks:{font:{family:'IBM Plex Mono',size:10},callback:v=>'R$'+(v/1e6).toFixed(1)+'M'}}}}});
}

// ─── NAVEGAÇÃO ───────────────────────────────
function sTab(n,btn){document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('on'));document.querySelectorAll('.tc').forEach(t=>t.classList.remove('on'));btn.classList.add('on');document.getElementById('tab-'+n).classList.add('on');}
function setM(m,btn){cm=m;document.querySelectorAll('.mp').forEach(b=>b.classList.remove('on'));btn.classList.add('on');buildKPI();buildDRE();buildContas();buildResp();}
function buildAll(){buildKPI();buildDRE();buildContas();buildResp();requestAnimationFrame(initCharts);}

// ─── INIT ────────────────────────────────────
loadData();
</script>
</body>
