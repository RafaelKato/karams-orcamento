<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karams — Criar Senha</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:#1c3a5e;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:#fff;border-radius:16px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.logo{font-family:'DM Serif Display',serif;font-size:28px;color:#1c3a5e;text-align:center;margin-bottom:4px}
.sub{font-size:11px;color:#9a978f;letter-spacing:2px;text-transform:uppercase;text-align:center;margin-bottom:32px}
.msg{font-size:14px;color:#55524e;line-height:1.6;margin-bottom:24px;text-align:center}
.field{margin-bottom:18px}
.field label{display:block;font-size:11px;font-weight:600;color:#55524e;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.field input{width:100%;padding:11px 14px;border:1.5px solid #e2dfda;border-radius:8px;font-family:'Sora',sans-serif;font-size:13px;color:#18171a;outline:none;transition:border-color .15s}
.field input:focus{border-color:#2b5f96}
.btn{width:100%;padding:13px;background:#1c3a5e;color:#fff;border:none;border-radius:8px;font-family:'Sora',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s;margin-top:6px}
.btn:hover{background:#2b5f96}
.btn:disabled{background:#9a978f;cursor:not-allowed}
.err{color:#9b1a1a;font-size:12px;text-align:center;margin-top:12px;min-height:18px}
.ok-box{text-align:center}
.ok-icon{font-size:48px;margin-bottom:16px}
.ok-title{font-family:'DM Serif Display',serif;font-size:22px;color:#166140;margin-bottom:8px}
.ok-msg{font-size:13px;color:#55524e;margin-bottom:24px}
.ok-btn{display:inline-block;padding:12px 32px;background:#1c3a5e;color:#fff;border-radius:8px;font-family:'Sora',sans-serif;font-size:13px;font-weight:600;text-decoration:none}
.ok-btn:hover{background:#2b5f96}
.hint{font-size:11px;color:#9a978f;margin-top:4px}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="box">
  <div class="logo">Karams</div>
  <div class="sub">Dashboard Orçamentário</div>
  <div id="content"></div>
</div>

<script>
var IDENTITY_URL = 'https://karamsorcamento.netlify.app/.netlify/identity';

// Extrai token do hash da URL
function getToken() {
  var hash = window.location.hash.substring(1);
  var params = {};
  hash.split('&').forEach(function(part) {
    var item = part.split('=');
    if (item.length === 2) params[item[0]] = decodeURIComponent(item[1]);
  });
  return {
    invite:   params['invite_token']   || null,
    recovery: params['recovery_token'] || null,
    confirm:  params['confirmation_token'] || null,
  };
}

var tokens = getToken();
var el = document.getElementById('content');

function showError(msg) {
  document.getElementById('err-msg').textContent = msg;
}

function showForm(title, btnText) {
  el.innerHTML = `
    <div class="msg">${title}</div>
    <div class="field">
      <label>Nova Senha</label>
      <input type="password" id="pw1" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
      <div class="hint" id="pw1-hint"></div>
    </div>
    <div class="field">
      <label>Confirmar Senha</label>
      <input type="password" id="pw2" placeholder="Repita a senha" autocomplete="new-password">
    </div>
    <button class="btn" id="submit-btn" onclick="submitPassword()">${btnText}</button>
    <div class="err" id="err-msg"></div>
  `;

  document.getElementById('pw1').addEventListener('input', function() {
    var hint = document.getElementById('pw1-hint');
    hint.textContent = this.value.length > 0 && this.value.length < 8 ? 'Mínimo 8 caracteres' : '';
  });

  document.getElementById('pw2').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') submitPassword();
  });
}

function showSuccess() {
  el.innerHTML = `
    <div class="ok-box">
      <div class="ok-icon">✓</div>
      <div class="ok-title">Senha criada!</div>
      <div class="ok-msg">Sua senha foi definida com sucesso.<br>Clique abaixo para acessar o dashboard.</div>
      <a href="/" class="ok-btn">Acessar o Dashboard</a>
    </div>
  `;
}

function showInvalid() {
  el.innerHTML = `
    <div class="ok-box">
      <div class="ok-icon" style="color:#9b1a1a">✗</div>
      <div class="ok-title" style="color:#9b1a1a">Link inválido</div>
      <div class="ok-msg">Este link expirou ou já foi utilizado.<br>Solicite um novo convite ao administrador.</div>
      <a href="/" class="ok-btn">Voltar ao login</a>
    </div>
  `;
}

async function submitPassword() {
  var pw1 = document.getElementById('pw1').value;
  var pw2 = document.getElementById('pw2').value;
  var btn = document.getElementById('submit-btn');

  if (!pw1 || pw1.length < 8) { showError('A senha precisa ter pelo menos 8 caracteres.'); return; }
  if (pw1 !== pw2) { showError('As senhas não coincidem.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Salvando...';
  showError('');

  try {
    var token = tokens.invite || tokens.recovery || tokens.confirm;
    
    // Primeiro: verificar/trocar o token por um access token
    var verifyRes = await fetch(IDENTITY_URL + '/verify', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        token: token,
        type: tokens.invite ? 'invite' : tokens.recovery ? 'recovery' : 'signup',
        password: pw1
      })
    });

    if (verifyRes.ok) {
      showSuccess();
      return;
    }

    // Fallback: usar token direto como Bearer e atualizar senha
    var updateRes = await fetch(IDENTITY_URL + '/user', {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({ password: pw1 })
    });

    if (updateRes.ok) {
      showSuccess();
    } else {
      var data = await updateRes.json().catch(() => ({}));
      throw new Error(data.msg || data.error_description || 'Link inválido ou expirado.');
    }

  } catch(e) {
    if (e.message.includes('invalid') || e.message.includes('expired') || e.message.includes('token')) {
      showInvalid();
    } else {
      showError(e.message || 'Erro ao salvar. Tente novamente.');
      btn.disabled = false;
      btn.textContent = 'Salvar senha';
    }
  }
}

// Inicializa
if (tokens.invite) {
  showForm('Bem-vindo! Crie sua senha para acessar o Dashboard Orçamentário da Karams.', 'Criar senha');
} else if (tokens.recovery) {
  showForm('Digite sua nova senha abaixo.', 'Redefinir senha');
} else if (tokens.confirm) {
  showForm('Confirme sua conta criando uma senha de acesso.', 'Confirmar e criar senha');
} else {
  showInvalid();
}
</script>
</body>
</html>
